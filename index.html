<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EARTH DEFENDER</title>
    <link
      rel="icon"
      type="image/png"
      href="./STATIC/assets/Untitled design.png"
    />

    <link rel="stylesheet" href="./STATIC/index.css" />
  </head>

  <body class="app">
    <!-- overlays -->
    <div class="overlay overlay--scanlines" aria-hidden="true"></div>
    <div class="overlay overlay--stars" aria-hidden="true"></div>
    <div class="overlay overlay--crt" aria-hidden="true">
      <div class="crt-line"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <span class="icon icon--fill accent">rocket_launch</span>
        <h1 class="brand__title accent" id="homeBtn">EARTH DEFENDER</h1>
      </div>
    </header>

    <aside class="performance"></aside>
    <main class="main">
      <!-- GAME (hidden until start) -->
      <div class="game-container" id="game" hidden>
        <div class="grid"></div>
      </div>

      <!-- LANDING UI (visible until start) -->
      <section class="hero" id="landing">
        <h2 class="hero__title accent">EARTH<br />DEFENDER</h2>

        <div class="hero__meta">
          <span>Year: 2148</span>
          <span>CPU: 8080A</span>
        </div>
      </section>

      <div id="gameOverScreen" class="game-over-overlay">
        <div class="game-over-popup">
          <h1>Game Over</h1>

          <p>
            Final Score:
            <span id="finalScore">0</span>
          </p>
          <div class="popup-actions">
            <button
              class="btn btn--primary glitch"
              type="button"
              id="gameOverHomeBtn"
            >
              <span class="icon icon--fill icon--xl">home</span>
              <span class="btn__text">HOME</span>
              <span class="icon icon--xl">chevron_right</span>
            </button>

            <button
              class="btn btn--primary glitch"
              type="button"
              id="restartBtn"
            >
              <span class="icon icon--fill icon--xl">restart_alt</span>
              <span class="btn__text">RESTART</span>
              <span class="icon icon--xl">chevron_right</span>
            </button>
          </div>
        </div>
      </div>

      <div id="victoryScreen" class="game-over-overlay">
        <div class="game-over-popup">
          <h1>🚀 Victory</h1>

          <p>
            Final Score:
            <span id="victoryScore">0</span>
          </p>

          <div class="victory-actions">
            <button id="nextLevelBtn" class="btn btn--danger glitch">
              NEXT LEVEL
            </button>

            <button id="abortBtn" class="btn btn--danger glitch" type="button">
              <span class="icon">power_settings_new</span>
              <span>ABORT SYSTEM</span>
            </button>
          </div>
        </div>
      </div>
      <div id="scorePopup" class="game-over-overlay" style="display: none">
        <div class="game-over-popup">
          <h1>NEW SCORE</h1>

          <p>Enter your name</p>

          <input
            id="playerName"
            type="text"
            maxlength="10"
            placeholder="AAA"
            autocomplete="off"
          />

          <div class="popup-actions">
            <button
              class="btn btn--primary glitch"
              type="button"
              id="saveScoreBtn"
            >
              <span class="icon icon--fill icon--xl">save</span>
              <span class="btn__text">SAVE SCORE</span>
              <span class="icon icon--xl">chevron_right</span>
            </button>
          </div>
        </div>
      </div>

      <section class="actions">
        <button
          class="btn btn--primary glitch"
          type="button"
          id="startStoryBtn"
        >
          <span class="icon icon--fill icon--xl">rocket_launch</span>
          <span class="btn__text">STORY MODE</span>
          <span class="icon icon--xl">chevron_right</span>
        </button>

        <button
          class="btn btn--primary glitch"
          type="button"
          id="startInfiniteBtn"
        >
          <span class="icon icon--fill icon--xl">rocket_launch</span>
          <span class="btn__text">INFINITE MODE</span>
          <span class="icon icon--xl">chevron_right</span>
        </button>

        <button
          class="btn btn--leaderboard glitch"
          type="button"
          id="leaderboardBtn"
        >
          <span class="icon icon--fill icon--xl">trophy </span>
          <span class="btn__text">LEADERBOARD</span>
          <span class="icon icon--xl">chevron_right</span>
        </button>
      </section>
    </main>
    <aside class="hud" id="hud" hidden>
      <div class="hud-timer">TIME: <span id="timer">00:00</span></div>
      <div class="hud-score">SCORE: <span id="scoreValue">0</span></div>

      <div class="hud-lives">
        <span id="livesCount">3</span>
        <span>×</span>
        <img src="./STATIC/assets/lives.png" alt="Ship" class="life-icon" />
      </div>
    </aside>

    <footer class="footer">
      <div class="footer__left">
        <span class="footer__brand">Zone01.</span>
        <span class="footer__copy">© 2026 ALL RIGHTS RESERVED</span>
      </div>
    </footer>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
